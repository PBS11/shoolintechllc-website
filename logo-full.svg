<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400">

  <defs>
    <filter id="tipGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="jGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="prongGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#2468b5"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#091829"/>
      <stop offset="50%"  stop-color="#112640"/>
      <stop offset="100%" stop-color="#091829"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00c8ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0d1b2e"/>
      <stop offset="50%"  stop-color="#163a60"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00c8ff"/>
      <stop offset="80%"  stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Background: light gray, full card ── -->
  <rect width="320" height="400" rx="28" fill="#f0f2f5"/>

  <!-- ── Ambient glow behind icon ── -->
  <ellipse cx="160" cy="170" rx="120" ry="110" fill="url(#bgGlow)"/>

  <!-- ── TRIDENT BODY (centered at 160, icon spans y=40 to y=300) ── -->

  <!-- Center prong (tallest) -->
  <polygon points="160,44  154,88  151,176  169,176  166,88" fill="url(#prongGrad)"/>

  <!-- Left prong -->
  <polygon points="82,98  90,130  91,178  108,178" fill="url(#prongGrad)"/>

  <!-- Right prong -->
  <polygon points="238,98  230,130  229,178  212,178" fill="url(#prongGrad)"/>

  <!-- Crossbar -->
  <rect x="76" y="172" width="168" height="14" rx="7" fill="url(#bodyGrad)"/>

  <!-- Shaft -->
  <rect x="152" y="186" width="16" height="80" rx="8" fill="url(#bodyGrad)"/>

  <!-- Base ornament -->
  <rect x="140" y="264" width="40" height="12" rx="6" fill="#0d2038"/>
  <rect x="148" y="275" width="24" height="7"  rx="3.5" fill="#091829"/>

  <!-- ── NEURAL CONNECTIONS ── -->

  <!-- Arc across all three tips -->
  <path d="M 82,98 Q 160,60 238,98" stroke="#00c8ff" stroke-width="1.6" fill="none" opacity="0.3"/>

  <!-- Left tip ↔ Center tip -->
  <line x1="82"  y1="98" x2="160" y2="44" stroke="#00c8ff" stroke-width="1.4" opacity="0.38"/>
  <!-- Center tip ↔ Right tip -->
  <line x1="160" y1="44" x2="238" y2="98" stroke="#00c8ff" stroke-width="1.4" opacity="0.38"/>

  <!-- Tips → Center junction (converging) -->
  <line x1="82"  y1="98"  x2="160" y2="178" stroke="#00c8ff" stroke-width="1"   opacity="0.14"/>
  <line x1="238" y1="98"  x2="160" y2="178" stroke="#00c8ff" stroke-width="1"   opacity="0.14"/>

  <!-- Cross network diagonals -->
  <line x1="82"  y1="98"  x2="229" y2="178" stroke="#00c8ff" stroke-width="0.7" opacity="0.07"/>
  <line x1="238" y1="98"  x2="91"  y2="178" stroke="#00c8ff" stroke-width="0.7" opacity="0.07"/>

  <!-- ── GLOWING NODES ── -->

  <!-- Center tip — dominant node -->
  <circle cx="160" cy="44" r="16"  fill="#00c8ff" opacity="0.18" filter="url(#tipGlow)"/>
  <circle cx="160" cy="44" r="10"  fill="#00d4ff"/>
  <circle cx="160" cy="44" r="5.5" fill="#e8faff"/>
  <circle cx="160" cy="44" r="2"   fill="#ffffff"/>

  <!-- Left tip -->
  <circle cx="82" cy="98" r="13"  fill="#00c8ff" opacity="0.16" filter="url(#tipGlow)"/>
  <circle cx="82" cy="98" r="8"   fill="#00c8ff"/>
  <circle cx="82" cy="98" r="4"   fill="#cff4ff"/>
  <circle cx="82" cy="98" r="1.5" fill="#ffffff"/>

  <!-- Right tip -->
  <circle cx="238" cy="98" r="13"  fill="#00c8ff" opacity="0.16" filter="url(#tipGlow)"/>
  <circle cx="238" cy="98" r="8"   fill="#00c8ff"/>
  <circle cx="238" cy="98" r="4"   fill="#cff4ff"/>
  <circle cx="238" cy="98" r="1.5" fill="#ffffff"/>

  <!-- Center junction -->
  <circle cx="160" cy="178" r="9"   fill="#f0f2f5" stroke="#00a8d8" stroke-width="3" filter="url(#jGlow)"/>
  <circle cx="160" cy="178" r="3.5" fill="#00c8ff"/>

  <!-- Left junction (1/4 crossbar) -->
  <circle cx="104" cy="179" r="6"   fill="#f0f2f5" stroke="#0080a8" stroke-width="2.2"/>
  <circle cx="104" cy="179" r="2"   fill="#00a0c8"/>

  <!-- Right junction (3/4 crossbar) -->
  <circle cx="216" cy="179" r="6"   fill="#f0f2f5" stroke="#0080a8" stroke-width="2.2"/>
  <circle cx="216" cy="179" r="2"   fill="#00a0c8"/>

  <!-- Base node -->
  <circle cx="160" cy="280" r="4.5" fill="#f0f2f5" stroke="#005c7a" stroke-width="1.8"/>
  <circle cx="160" cy="280" r="1.5" fill="#0080a0"/>

  <!-- ── TYPOGRAPHY ── -->

  <!-- "SHOOLINTECH" wordmark -->
  <text
    x="160" y="336"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="7"
    fill="#0d1b2e"
  >SHOOLINTECH</text>

  <!-- Cyan gradient accent line under text -->
  <rect x="52" y="346" width="216" height="2.5" rx="1.25" fill="url(#accentLine)"/>

  <!-- Tagline -->
  <text
    x="160" y="374"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="4"
    fill="#6b7c93"
  >AI · INNOVATION · ENTERPRISE</text>

</svg>
