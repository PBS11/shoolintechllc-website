<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 412">

  <style>
    /* Pulsing glow on hub nodes */
    .pulse-a { animation: pA 2.8s ease-in-out infinite; }
    .pulse-b { animation: pA 2.8s ease-in-out 0.9s infinite; }
    .pulse-c { animation: pA 2.8s ease-in-out 1.8s infinite; }
    @keyframes pA {
      0%,100% { opacity: 0.10; }
      50%     { opacity: 0.42; }
    }
    /* Data flow along key edges */
    .flow-a { stroke-dasharray: 8 5; animation: fA 1.8s linear infinite; }
    .flow-b { stroke-dasharray: 7 5; animation: fA 2.2s linear infinite 0.5s; }
    .flow-c { stroke-dasharray: 6 5; animation: fA 1.5s linear infinite 1.0s; }
    @keyframes fA {
      from { stroke-dashoffset: 26; }
      to   { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Background -->
  <rect width="560" height="412" fill="#E4E7EC"/>

  <defs>
    <!-- Prong gradients -->
    <linearGradient id="pg" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#0B1D3A"/>
      <stop offset="42%"  stop-color="#1768B4"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
    <linearGradient id="pgs" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#0B1D3A"/>
      <stop offset="42%"  stop-color="#155EA8"/>
      <stop offset="100%" stop-color="#00BEE8"/>
    </linearGradient>
    <linearGradient id="sg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#060E1A"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="gBloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gMed" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
  </defs>


  <!-- ══════════════════════════════════════════
       DEPTH LAYER — faint background synapses
       create sense of a larger hidden network
       ══════════════════════════════════════════ -->
  <g opacity="0.13" stroke="#00A0C0" fill="none">
    <line x1="178" y1="46" x2="108" y2="66" stroke-width="0.9"/>
    <line x1="82"  y1="78" x2="108" y2="66" stroke-width="0.9"/>
    <line x1="108" y1="66" x2="130" y2="100" stroke-width="0.8"/>
    <line x1="82"  y1="78" x2="130" y2="100" stroke-width="0.8"/>
    <line x1="178" y1="46" x2="214" y2="28" stroke-width="0.8"/>
    <line x1="274" y1="78" x2="214" y2="28" stroke-width="0.8"/>
    <line x1="214" y1="28" x2="318" y2="56" stroke-width="0.7"/>
  </g>
  <!-- Depth-layer micro nodes -->
  <circle cx="108" cy="66"  r="3"   fill="#0088A8" opacity="0.22"/>
  <circle cx="130" cy="100" r="3.5" fill="#007898" opacity="0.22"/>
  <circle cx="214" cy="28"  r="3"   fill="#0098C0" opacity="0.22"/>


  <!-- ══════════════════════════════════════════
       TRIDENT    junction: (178, 205)
       Center tip  (178,  46)  straight up
       Left tip    ( 82,  78)  rotate −37°
       Right tip   (274,  78)  rotate +37°
       ══════════════════════════════════════════ -->

  <!-- Left prong -->
  <g transform="rotate(-37, 178, 205)">
    <rect x="168" y="82" width="20" height="123" rx="10" fill="url(#pgs)"/>
    <polygon points="178,48  160,90  168,82  188,82  196,90" fill="#00BEE8"/>
    <line x1="178" y1="82" x2="178" y2="205" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  </g>

  <!-- Right prong -->
  <g transform="rotate(37, 178, 205)">
    <rect x="168" y="82" width="20" height="123" rx="10" fill="url(#pgs)"/>
    <polygon points="178,48  160,90  168,82  188,82  196,90" fill="#00BEE8"/>
    <line x1="178" y1="82" x2="178" y2="205" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  </g>

  <!-- Center prong (on top) -->
  <rect x="168" y="60" width="20" height="145" rx="10" fill="url(#pg)"/>
  <polygon points="178,42  160,86  168,76  188,76  196,86" fill="#00D4FF"/>
  <!-- Center tip ambient bloom -->
  <circle cx="178" cy="46" r="20" fill="#00D4FF" opacity="0.16" filter="url(#gBloom)" class="pulse-a"/>
  <!-- Channel highlight -->
  <line x1="178" y1="60" x2="178" y2="205" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.38"/>

  <!-- Shaft -->
  <rect x="169" y="205" width="18" height="80" rx="9" fill="url(#sg)"/>
  <polygon points="167,282  189,282  178,300" fill="#060E1A"/>
  <line x1="178" y1="205" x2="178" y2="282" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.16"/>
  <!-- Junction dot -->
  <circle cx="178" cy="205" r="7" fill="white" opacity="0.5"/>


  <!-- ══════════════════════════════════════════
       NEURAL NETWORK EDGES
       Drawn in three tiers: primary, secondary, skip
       ══════════════════════════════════════════ -->

  <!-- ── Tier 1: Primary / high-bandwidth connections (animated flow) ── -->
  <!-- Center-tip → n4  (data stream from trident) -->
  <line x1="178" y1="46" x2="320" y2="56"
        stroke="#0094C0" stroke-width="1.6" opacity="0.5" class="flow-a"/>
  <!-- Right-tip → n4 -->
  <line x1="274" y1="78" x2="320" y2="56"
        stroke="#00A0C8" stroke-width="2.2" opacity="0.6" class="flow-b"/>
  <!-- n4 → n6  (KEY pathway — dominant hub feed) -->
  <line x1="320" y1="56" x2="368" y2="42"
        stroke="#00B0D8" stroke-width="2.4" opacity="0.72" class="flow-c"/>
  <!-- n6 → n7 -->
  <line x1="368" y1="42" x2="412" y2="66"
        stroke="#00A8D2" stroke-width="2" opacity="0.62" class="flow-a"/>
  <!-- n7 → n9 -->
  <line x1="412" y1="66" x2="452" y2="52"
        stroke="#0098C4" stroke-width="1.8" opacity="0.55" class="flow-b"/>

  <!-- ── Tier 2: Secondary connections (static) ── -->
  <!-- Right-tip → n5 -->
  <line x1="274" y1="78" x2="294" y2="114"
        stroke="#0088B0" stroke-width="1.8" opacity="0.45"/>
  <!-- n4 → n5 -->
  <line x1="320" y1="56" x2="294" y2="114"
        stroke="#0090B8" stroke-width="1.6" opacity="0.42"/>
  <!-- n5 → n8  (organic curve) -->
  <path d="M294,114 Q332,112 378,118"
        stroke="#0078A0" stroke-width="1.6" fill="none" opacity="0.40"/>
  <!-- n6 → n8 -->
  <line x1="368" y1="42" x2="378" y2="118"
        stroke="#009CC4" stroke-width="1.5" opacity="0.42"/>
  <!-- n7 → n8 -->
  <line x1="412" y1="66" x2="378" y2="118"
        stroke="#0086AE" stroke-width="1.5" opacity="0.40"/>
  <!-- n9 → n10 -->
  <line x1="452" y1="52" x2="470" y2="108"
        stroke="#0080A8" stroke-width="1.6" opacity="0.45"/>
  <!-- n7 → n10 -->
  <line x1="412" y1="66" x2="470" y2="108"
        stroke="#007298" stroke-width="1.4" opacity="0.36"/>
  <!-- n8 → n11 (curve) -->
  <path d="M378,118 Q404,132 436,146"
        stroke="#005E80" stroke-width="1.4" fill="none" opacity="0.38"/>
  <!-- n10 → n11 -->
  <line x1="470" y1="108" x2="436" y2="146"
        stroke="#005678" stroke-width="1.3" opacity="0.36"/>

  <!-- ── Tier 3: Skip / long-range connections (very faint — depth effect) ── -->
  <path d="M274,78 Q340,28 412,66"
        stroke="#0090C0" stroke-width="1" fill="none" opacity="0.20"/>
  <line x1="178" y1="46" x2="368" y2="42"
        stroke="#009CC8" stroke-width="0.9" opacity="0.18"/>
  <line x1="320" y1="56" x2="412" y2="66"
        stroke="#007898" stroke-width="0.8" opacity="0.18"/>
  <line x1="368" y1="42" x2="452" y2="52"
        stroke="#008EB8" stroke-width="0.8" opacity="0.22"/>
  <line x1="368" y1="42" x2="470" y2="108"
        stroke="#006A8C" stroke-width="0.7" opacity="0.16"/>


  <!-- ══════════════════════════════════════════
       NEURAL NODES
       Layered: bloom glow → body fill → bright inner → white core
       ══════════════════════════════════════════ -->

  <!-- ── MICRO SATELLITE NODES (synaptic terminals) ── -->
  <circle cx="298" cy="67"  r="3"   fill="#0092BC" opacity="0.75"/>
  <circle cx="344" cy="76"  r="2.8" fill="#009EC8" opacity="0.70"/>
  <circle cx="394" cy="88"  r="2.6" fill="#007BA0" opacity="0.65"/>
  <circle cx="310" cy="94"  r="2.4" fill="#007290" opacity="0.60"/>
  <circle cx="432" cy="60"  r="2.8" fill="#0090BA" opacity="0.65"/>
  <circle cx="455" cy="84"  r="2.2" fill="#006880" opacity="0.58"/>
  <circle cx="388" cy="140" r="2"   fill="#005878" opacity="0.50"/>
  <circle cx="460" cy="130" r="1.8" fill="#004D68" opacity="0.45"/>
  <circle cx="252" cy="88"  r="2.5" fill="#0088B0" opacity="0.60"/>
  <circle cx="350" cy="110" r="2.2" fill="#007098" opacity="0.58"/>

  <!-- ── LEFT TIP (n2 — input node, left) ── -->
  <circle cx="82" cy="78"  r="16"  fill="#00B8E0" opacity="0.12" filter="url(#gMed)" class="pulse-c"/>
  <circle cx="82" cy="78"  r="9"   fill="#00BCDE"/>
  <circle cx="82" cy="78"  r="4.5" fill="#7AE8F8"/>
  <circle cx="82" cy="78"  r="1.8" fill="white"/>

  <!-- ── RIGHT TIP (n3 — input node, right; bridge to cluster) ── -->
  <circle cx="274" cy="78" r="18"  fill="#00C0E8" opacity="0.14" filter="url(#gMed)" class="pulse-b"/>
  <circle cx="274" cy="78" r="10"  fill="#00C2E8"/>
  <circle cx="274" cy="78" r="5"   fill="#80E8F8"/>
  <circle cx="274" cy="78" r="2"   fill="white"/>

  <!-- ── N4 — first hub (convergence of tip streams) ── -->
  <circle cx="320" cy="56" r="14"  fill="#00AACE" opacity="0.16" filter="url(#gMed)" class="pulse-a"/>
  <circle cx="320" cy="56" r="9"   fill="#00AED0"/>
  <circle cx="320" cy="56" r="4.5" fill="#72DCF0"/>
  <circle cx="320" cy="56" r="1.8" fill="white"/>

  <!-- ── N5 — lower secondary hub ── -->
  <circle cx="294" cy="114" r="10"  fill="#0092BC"/>
  <circle cx="294" cy="114" r="5"   fill="#00BAD8"/>
  <circle cx="294" cy="114" r="2"   fill="white" opacity="0.65"/>

  <!-- ── N6 — DOMINANT HUB (brightest, largest — the AI "brain") ── -->
  <circle cx="368" cy="42" r="30"  fill="#00C8FF" opacity="0.12" filter="url(#gBloom)" class="pulse-a"/>
  <circle cx="368" cy="42" r="18"  fill="#00C8FF" opacity="0.18" filter="url(#gMed)" class="pulse-a"/>
  <circle cx="368" cy="42" r="12"  fill="#00D4FF"/>
  <circle cx="368" cy="42" r="6.5" fill="#A0F0FF"/>
  <circle cx="368" cy="42" r="2.5" fill="white"/>

  <!-- ── N7 — right secondary hub ── -->
  <circle cx="412" cy="66" r="14"  fill="#009EC8" opacity="0.16" filter="url(#gSoft)" class="pulse-c"/>
  <circle cx="412" cy="66" r="8.5" fill="#00A2CA"/>
  <circle cx="412" cy="66" r="4"   fill="#70D4EC"/>
  <circle cx="412" cy="66" r="1.6" fill="white"/>

  <!-- ── N8 — mid-depth node ── -->
  <circle cx="378" cy="118" r="9"   fill="#0088B2"/>
  <circle cx="378" cy="118" r="4.5" fill="#00B2D0"/>
  <circle cx="378" cy="118" r="1.8" fill="white" opacity="0.6"/>

  <!-- ── N9 — far-right upper node ── -->
  <circle cx="452" cy="52" r="12"  fill="#0092C0" opacity="0.18" filter="url(#gSoft)" class="pulse-b"/>
  <circle cx="452" cy="52" r="7"   fill="#0092BE"/>
  <circle cx="452" cy="52" r="3.2" fill="#62CAE2"/>
  <circle cx="452" cy="52" r="1.2" fill="white"/>

  <!-- ── N10 — far-right lower ── -->
  <circle cx="470" cy="108" r="7"   fill="#006A8A"/>
  <circle cx="470" cy="108" r="3.2" fill="#0092AC"/>
  <circle cx="470" cy="108" r="1"   fill="white" opacity="0.5"/>

  <!-- ── N11 — tail node ── -->
  <circle cx="436" cy="146" r="6"   fill="#005070"/>
  <circle cx="436" cy="146" r="2.6" fill="#007A94"/>

  <!-- ── CENTER TIP NODE (most prominent — energy source) ── -->
  <circle cx="178" cy="46" r="22"  fill="#00D4FF" opacity="0.12" filter="url(#gBloom)" class="pulse-a"/>
  <circle cx="178" cy="46" r="13"  fill="#00D4FF"/>
  <circle cx="178" cy="46" r="7"   fill="#A8F2FF"/>
  <circle cx="178" cy="46" r="2.8" fill="white"/>


  <!-- ══════════════════════════════════════════
       TYPOGRAPHY
       Mark: x≈62 left edge → x≈488 right edge
       Visual centre ≈ 275
       ══════════════════════════════════════════ -->

  <text
    x="275" y="358"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', 'Liberation Sans', sans-serif"
    font-size="56"
    letter-spacing="-1.5"
    fill="#0B1D3A"
  ><tspan font-weight="800">shoolin</tspan><tspan font-weight="400">tech</tspan></text>

  <!-- Cyan accent line -->
  <rect x="90" y="364" width="380" height="2" rx="1"
        fill="url(#accentLine)" opacity="0.7"/>

  <!-- Tagline -->
  <text
    x="275" y="392"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="11"
    font-weight="500"
    letter-spacing="5"
    fill="#4a6080"
  >AI · INNOVATION · DELIVERED</text>

</svg>
