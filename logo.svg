<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Transparent background — works on both light navbar and dark footer -->
  <defs>
    <filter id="tg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Prong gradient: indigo base → cyan tip (visible on white & dark) -->
    <linearGradient id="pg" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#1e3a6e"/>
      <stop offset="45%"  stop-color="#1d68b8"/>
      <stop offset="100%" stop-color="#00ccff"/>
    </linearGradient>
    <linearGradient id="pgs" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#1e3a6e"/>
      <stop offset="45%"  stop-color="#1560a8"/>
      <stop offset="100%" stop-color="#00b8e8"/>
    </linearGradient>
    <linearGradient id="sh" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#1a3560"/>
      <stop offset="100%" stop-color="#0d1e38"/>
    </linearGradient>
  </defs>

  <!-- Left prong -->
  <g transform="rotate(-37, 50, 58)">
    <rect x="43" y="25" width="14" height="33" rx="7" fill="url(#pgs)"/>
    <polygon points="50,14 41,29 44,25 56,25 59,29" fill="#00b8e8"/>
    <line x1="50" y1="25" x2="50" y2="58" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Right prong -->
  <g transform="rotate(37, 50, 58)">
    <rect x="43" y="25" width="14" height="33" rx="7" fill="url(#pgs)"/>
    <polygon points="50,14 41,29 44,25 56,25 59,29" fill="#00b8e8"/>
    <line x1="50" y1="25" x2="50" y2="58" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Center prong -->
  <rect x="43" y="18" width="14" height="40" rx="7" fill="url(#pg)"/>
  <polygon points="50,9 41,24 44,18 56,18 59,24" fill="#00ccff"/>
  <circle cx="50" cy="11" r="6" fill="#00ccff" opacity="0.2" filter="url(#tg)"/>
  <line x1="50" y1="18" x2="50" y2="58" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Shaft -->
  <rect x="45" y="58" width="10" height="22" rx="5" fill="url(#sh)"/>
  <polygon points="44,78 56,78 50,87" fill="#0d1e38"/>
  <circle cx="50" cy="58" r="4" fill="white" opacity="0.45"/>

  <!-- Neural network (right side, compact) -->
  <!-- Edges -->
  <line x1="72" y1="22" x2="85" y2="14" stroke="#0090b8" stroke-width="1.2" opacity="0.55"/>
  <line x1="72" y1="22" x2="82" y2="34" stroke="#007898" stroke-width="1" opacity="0.45"/>
  <line x1="85" y1="14" x2="82" y2="34" stroke="#0082a0" stroke-width="1" opacity="0.40"/>
  <line x1="82" y1="34" x2="90" y2="46" stroke="#006070" stroke-width="0.9" opacity="0.35"/>
  <line x1="85" y1="14" x2="94" y2="26" stroke="#007898" stroke-width="0.9" opacity="0.38"/>
  <line x1="94" y1="26" x2="90" y2="46" stroke="#005868" stroke-width="0.8" opacity="0.32"/>

  <!-- Nodes -->
  <!-- Junction with right prong tip -->
  <circle cx="72" cy="22" r="4"   fill="#0090b8"/>
  <circle cx="72" cy="22" r="2"   fill="#00c0d8"/>

  <!-- Top dominant node -->
  <circle cx="85" cy="14" r="7"   fill="#00c0ff" opacity="0.18" filter="url(#tg)"/>
  <circle cx="85" cy="14" r="4.5" fill="#00ccff"/>
  <circle cx="85" cy="14" r="2.2" fill="#a8f0ff"/>
  <circle cx="85" cy="14" r="0.8" fill="white"/>

  <!-- Right mid node -->
  <circle cx="94" cy="26" r="3.5" fill="#0090b8"/>
  <circle cx="94" cy="26" r="1.6" fill="#00b8d8"/>

  <!-- Lower mid node -->
  <circle cx="82" cy="34" r="3.8" fill="#0088b0"/>
  <circle cx="82" cy="34" r="1.8" fill="#00b0cc"/>

  <!-- Bottom node -->
  <circle cx="90" cy="46" r="3"   fill="#005c78"/>
  <circle cx="90" cy="46" r="1.3" fill="#0088a0"/>

  <!-- Center prong tip node (on top of arrowhead) -->
  <circle cx="50" cy="11" r="4.5" fill="#00ccff" filter="url(#sg)"/>
  <circle cx="50" cy="11" r="2.8" fill="#a8f2ff"/>
  <circle cx="50" cy="11" r="1"   fill="white"/>
</svg>
